<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memsphere - Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <path d="M10 5 Q15 2, 20 5 L20 35 Q15 38, 10 35 Z" fill="#0891b2"/>
                    <path d="M20 5 Q25 2, 30 5 L30 35 Q25 38, 20 35 Z" fill="#06b6d4"/>
                </svg>
                <span class="logo-text">memsphere</span>
            </div>
            <div class="nav-links">
                <a href="home.html" class="nav-link"><span class="icon">⊞</span> Home</a>
                <a href="index.html" class="nav-link"><span class="icon">🔍</span> Browse</a>
                <a href="profile.html" class="nav-link active"><span class="icon">👤</span> Profile</a>
                <a href="about.html" class="nav-link"><span class="icon">ⓘ</span> About</a>
            </div>
            <div class="user-section">
                <span class="icon">👤</span>
                <span>Mandy</span>
            </div>
        </div>
    </nav>

    <main class="main-content profile-page">
        <div class="profile-container">
            <div class="profile-card">
                <h2>Profile Information</h2>
                <form id="profileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="firstName" placeholder="First Name">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="lastName" placeholder="Last Name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Email Address">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="Phone Number">
                    </div>
                    <button type="submit" class="save-btn">Save Profile</button>
                </form>
            </div>

            <div class="profile-card">
                <h2>Change Password</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Change Password</label>
                        <input type="email" id="passwordEmail" placeholder="Change Password">
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
