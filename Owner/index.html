<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memsphere - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 50 50">
                    <path d="M10 40 Q10 10, 25 10 T40 25" stroke="currentColor" fill="none" stroke-width="4"/>
                    <path d="M15 35 Q15 15, 25 15 T35 25" stroke="currentColor" fill="none" stroke-width="4"/>
                </svg>
                <span class="logo-text">memsphere</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" aria-label="Notifications">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </button>
                <button class="icon-btn" aria-label="User Profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="10" r="3"/>
                        <path d="M6.168 18.849A4 4 0 0 1 10 16h4a4 4 0 0 1 3.834 2.855"/>
                    </svg>
                </button>
                <span class="user-name">Caster</span>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <nav>
                    <a href="#" class="nav-item active">Dashboard</a>
                </nav>
            </aside>

            <!-- Dashboard Content -->
            <main class="dashboard">
                <!-- Stats Cards -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-label">Total Members</div>
                        <div class="stat-value">1,234</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Members</div>
                        <div class="stat-value">863</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Pending Renewals</div>
                        <div class="stat-value">24</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Monthly Revenue</div>
                        <div class="stat-value">₱120,000</div>
                    </div>
                </div>

                <!-- Recent Applications -->
                <section class="applications-section">
                    <h2 class="section-title">Recent Application (4 Pending)</h2>
                    <div class="table-container">
                        <table class="applications-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Applied</th>
                                    <th>Date Applied</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="applicationsTable"></tbody>
                        </table>
                    </div>
                </section>

                <!-- Add Buttons Section -->
                <section class="add-section">
                    <div class="add-card" id="addPromotion">
                        <span>Add Promotion +</span>
                    </div>
                    <div class="add-card" id="addMembership">
                        <span>Add Membership Plan +</span>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
