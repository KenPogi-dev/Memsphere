<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Details - Memsphere</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="business-details.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <path d="M10 30 Q15 15, 20 20 T30 10" stroke="#0891b2" stroke-width="4" fill="none"/>
                </svg>
                <span>memsphere</span>
            </div>
            <nav>
                <a href="index.html" class="nav-item">
                    <span class="icon">⊞</span>
                    Dashboard
                </a>
                <a href="index.html#approvals" class="nav-item">
                    <span class="icon">⚙</span>
                    Business Approvals
                </a>
                <a href="index.html#businesses" class="nav-item active">
                    <span class="icon">🏛</span>
                    All Businesses
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search Business">
                </div>
                <div class="header-actions">
                    <button class="icon-btn">🔔</button>
                    <button class="icon-btn">👤</button>
                </div>
            </header>

            <!-- Business Details -->
            <div class="details-container">
                <div class="details-card">
                    <span class="status-badge" id="statusBadge">Active</span>
                    <div class="business-image"></div>
                    <h2 class="business-name" id="businessName">Daily Grind Cafe</h2>
                    
                    <div class="details-info">
                        <div class="info-item">
                            <span class="info-label">Owner</span>
                            <span class="info-value" id="ownerName">Caster Andres</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Location</span>
                            <span class="info-value" id="location">123 Main Street, City</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Date Registered</span>
                            <span class="info-value" id="dateRegistered">February 01, 2026</span>
                        </div>
                    </div>

                    <button class="btn-back" onclick="window.history.back()">Back to List</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Get business data from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const businessName = urlParams.get('name') || 'Daily Grind Cafe';
        const owner = urlParams.get('owner') || 'Caster Andres';
        const status = urlParams.get('status') || 'active';
        const date = urlParams.get('date') || 'February 01, 2026';
        const location = urlParams.get('location') || '123 Main Street, City';

        // Update the page with business data
        document.getElementById('businessName').textContent = businessName;
        document.getElementById('ownerName').textContent = owner;
        document.getElementById('dateRegistered').textContent = date;
        document.getElementById('location').textContent = location;

        // Update status badge
        const statusBadge = document.getElementById('statusBadge');
        if (status.toLowerCase() === 'pending') {
            statusBadge.textContent = 'Pending';
            statusBadge.classList.remove('active');
            statusBadge.classList.add('pending');
        } else {
            statusBadge.textContent = 'Active';
            statusBadge.classList.remove('pending');
            statusBadge.classList.add('active');
        }
    </script>
</body>
</html>
